<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Acceso — Taller360 · Arsys Intela</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              arsys: {
                navy: '#0a1628',
                deep: '#0f2847',
                panel: '#132f52',
                accent: '#2563eb',
                light: '#38bdf8',
                muted: '#64748b',
              },
            },
            fontFamily: {
              sans: ['DM Sans', 'system-ui', 'sans-serif'],
            },
          },
        },
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet" />
    <script src="/shared/js/config.js"></script>
    <script type="module" src="/shared/js/supabase-client.js"></script>
    <script type="module" src="/shared/js/auth.js"></script>
  </head>
  <body class="min-h-screen bg-gradient-to-br from-arsys-navy via-slate-950 to-arsys-deep font-sans text-slate-100 antialiased">
    <div class="pointer-events-none fixed inset-0 overflow-hidden">
      <div class="absolute -left-32 top-1/4 h-96 w-96 rounded-full bg-blue-600/20 blur-3xl"></div>
      <div class="absolute -right-24 bottom-1/4 h-80 w-80 rounded-full bg-sky-500/10 blur-3xl"></div>
    </div>

    <div class="relative flex min-h-screen flex-col items-center justify-center p-4 sm:p-6">
      <div class="mb-8 flex flex-col items-center text-center sm:mb-10">
        <div
          class="mb-4 flex h-14 w-14 items-center justify-center rounded-2xl bg-gradient-to-br from-blue-500 to-sky-400 shadow-lg shadow-blue-500/30 ring-1 ring-white/10"
        >
          <span class="text-xl font-bold text-white">360</span>
        </div>
        <p class="text-xs font-semibold uppercase tracking-[0.2em] text-sky-400/90">Arsys Intela</p>
        <h1 class="mt-2 text-3xl font-bold tracking-tight text-white sm:text-4xl">Taller360</h1>
        <p class="mt-2 max-w-sm text-sm text-slate-400">Gestión integral de talleres mecánicos. Un solo acceso, tu portal según tu rol.</p>
      </div>

      <div
        class="w-full max-w-[420px] rounded-2xl border border-white/10 bg-arsys-panel/80 p-6 shadow-2xl shadow-black/40 backdrop-blur-xl sm:p-8"
      >
        <h2 class="text-lg font-semibold text-white">Iniciar sesión</h2>
        <p class="mt-1 text-sm text-slate-400">Correo y contraseña de tu cuenta Supabase.</p>

        <form id="form-login" class="mt-6 space-y-4">
          <div>
            <label for="email" class="mb-1.5 block text-sm font-medium text-slate-300">Correo electrónico</label>
            <input
              id="email"
              type="email"
              name="email"
              required
              autocomplete="username"
              class="w-full rounded-xl border border-white/10 bg-arsys-navy/80 px-4 py-3 text-sm text-white placeholder-slate-500 outline-none ring-sky-500/50 transition focus:border-sky-500/50 focus:ring-2"
              placeholder="tu@correo.com"
            />
          </div>
          <div>
            <label for="password" class="mb-1.5 block text-sm font-medium text-slate-300">Contraseña</label>
            <input
              id="password"
              type="password"
              name="password"
              required
              autocomplete="current-password"
              class="w-full rounded-xl border border-white/10 bg-arsys-navy/80 px-4 py-3 text-sm text-white placeholder-slate-500 outline-none ring-sky-500/50 transition focus:border-sky-500/50 focus:ring-2"
              placeholder="••••••••"
            />
          </div>
          <div id="msg" class="hidden rounded-lg border border-rose-500/30 bg-rose-500/10 px-3 py-2 text-sm text-rose-200"></div>
          <button
            type="submit"
            id="btn-submit"
            class="flex w-full items-center justify-center gap-2 rounded-xl bg-gradient-to-r from-blue-600 to-sky-500 py-3 text-sm font-semibold text-white shadow-lg shadow-blue-600/25 transition hover:from-blue-500 hover:to-sky-400 focus:outline-none focus:ring-2 focus:ring-sky-400/50 disabled:opacity-60"
          >
            <span>Entrar</span>
            <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" />
            </svg>
          </button>
        </form>

        <p class="mt-6 text-center text-sm text-slate-500">
          ¿Registrar un nuevo taller?
          <a href="/auth/register-taller.html" class="font-medium text-sky-400 hover:text-sky-300">Crear cuenta de taller</a>
        </p>
      </div>

      <p class="mt-8 text-center text-xs text-slate-600">© Arsys Intela · Taller360</p>
    </div>

    <script type="module">
      console.log('[Taller360 login] Módulo login.html cargado');
      import { redirectIfAuthenticated, signInAndRedirectByRole } from '/shared/js/auth.js';

      const msg = document.getElementById('msg');
      const btn = document.getElementById('btn-submit');

      function showErr(t) {
        msg.textContent = t;
        msg.classList.remove('hidden');
      }

      function hideErr() {
        msg.classList.add('hidden');
      }

      try {
        const flash = sessionStorage.getItem('taller360_auth_flash');
        if (flash) {
          showErr(flash);
          sessionStorage.removeItem('taller360_auth_flash');
        }
      } catch {
        /* ignore */
      }

      const already = await redirectIfAuthenticated();
      if (!already) {
      document.getElementById('form-login').addEventListener('submit', async (e) => {
        e.preventDefault();
        hideErr();
        const fd = new FormData(e.target);
        const email = String(fd.get('email') || '').trim();
        const password = String(fd.get('password') || '');
        btn.disabled = true;
        const result = await signInAndRedirectByRole(email, password);
        if (!result.ok) {
          showErr(result.message);
          btn.disabled = false;
          return;
        }
        window.location.replace(result.redirect);
      });
      }
    </script>
  </body>
</html>
