<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Taller360 — Mi cuenta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/shared/app-config.js"></script>
  </head>
  <body class="min-h-screen bg-sky-50 text-slate-900 antialiased">
    <header class="border-b border-sky-100 bg-white shadow-sm">
      <div class="mx-auto flex max-w-4xl items-center justify-between px-6 py-4">
        <div>
          <p class="text-xs font-semibold uppercase tracking-widest text-sky-600">Cliente</p>
          <h1 class="text-lg font-bold text-slate-900">Mis vehículos</h1>
        </div>
        <button id="btn-out" type="button" class="rounded-lg border border-slate-200 px-3 py-1.5 text-sm text-slate-700 hover:bg-slate-50">
          Salir
        </button>
      </div>
    </header>
    <main class="mx-auto max-w-4xl px-6 py-10">
      <div id="cards" class="grid gap-4 sm:grid-cols-2"></div>
    </main>
    <script type="module">
      import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

      const cfg = window.TALLER360;
      const key = cfg.SUPABASE_KEY || cfg.SUPABASE_ANON_KEY;
      const supabase = createClient(cfg.SUPABASE_URL, key);

      async function guard() {
        const { data: s } = await supabase.auth.getSession();
        if (!s.session) {
          window.location.href = '/login.html';
          return null;
        }
        const { data: profile } = await supabase.from('profiles').select('role').single();
        if (profile?.role !== 'CLIENT') {
          window.location.href = '/login.html';
          return null;
        }
        return s.session.access_token;
      }

      async function api(path, token) {
        const res = await fetch(`${cfg.API_BASE}${path}`, { headers: { Authorization: `Bearer ${token}` } });
        const j = await res.json();
        if (!res.ok) throw new Error(j.error || res.statusText);
        return j;
      }

      document.getElementById('btn-out').addEventListener('click', async () => {
        await supabase.auth.signOut();
        window.location.href = '/login.html';
      });

      const token = await guard();
      if (!token) throw new Error('no session');

      const r = await api('/api/cliente/vehicles', token);
      const root = document.getElementById('cards');
      root.innerHTML = (r.data || [])
        .map((v) => {
          const thumbs = (v.photoUrls || []).filter((p) => p.signedUrl).slice(0, 3);
          const imgs = thumbs.map((p) => `<img src="${p.signedUrl}" class="h-20 w-full rounded object-cover" alt="" />`).join('');
          return `
          <article class="overflow-hidden rounded-xl border border-sky-100 bg-white shadow-sm">
            <div class="grid grid-cols-3 gap-1 bg-sky-50 p-1">${imgs || '<div class="col-span-3 py-6 text-center text-sm text-slate-400">Sin fotos</div>'}</div>
            <div class="p-4">
              <p class="font-semibold text-slate-900">${v.plate}</p>
              <p class="text-sm text-slate-600">${v.brand || ''} ${v.model || ''} ${v.year || ''}</p>
              <a class="mt-3 inline-block text-sm font-medium text-sky-700 hover:text-sky-900" href="/cliente/vehiculo.html?id=${v.id}">Ver historial de órdenes</a>
            </div>
          </article>`;
        })
        .join('') || '<p class="text-slate-500">No hay vehículos asignados a su cuenta.</p>';
    </script>
  </body>
</html>
